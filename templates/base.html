<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AirFlow Twin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { padding-top: 0.2cm; }
        nav { height: 3.5rem; }
        nav .text-xl { font-size: 1.125rem !important; }
        nav .text-\[9px\] { font-size: 8px !important; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex flex-col">

    <!-- TOP HEADER WITH STATS (COMPACT) -->
    <nav class="flex justify-between items-center px-6 bg-slate-900 border-b border-slate-800 flex-shrink-0">
        
        <!-- LEFT: Logo -->
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">AIRFLOW TWIN</h1>
                    <p class="text-[9px] text-slate-400">Airport Operations Digital Twin</p>
                </div>
            </a>
        </div>

        <!-- CENTER: Stats (Compact) -->
        <div class="flex items-center gap-4">
            <!-- High-Risk Flights -->
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-red-900/30">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <div>
                    <p class="text-[8px] text-slate-400 uppercase font-semibold tracking-wider">High-Risk Flights</p>
                    <p class="text-lg font-bold text-red-500 leading-none"><span id="high-risk-count">3</span> <span class="text-xs text-slate-500 font-normal">of 24</span></p>
                </div>
            </div>

            <!-- Predicted Delay -->
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-yellow-900/30">
                <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <div>
                    <p class="text-[8px] text-slate-400 uppercase font-semibold tracking-wider">Predicted Delay</p>
                    <p class="text-lg font-bold text-yellow-500 leading-none" id="predicted-delay-value">0m <span class="text-xs text-slate-500 font-normal">Total</span></p>
                </div>
            </div>

            <!-- Delay Prevented -->
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-green-900/30">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <div>
                    <p class="text-[8px] text-slate-400 uppercase font-semibold tracking-wider">Delay Prevented</p>
                    <p class="text-lg font-bold text-green-500 leading-none" id="prevented-delay">48m <span class="text-xs text-slate-500 font-normal">Today</span></p>
                </div>
            </div>
        </div>

        <!-- RIGHT: Navigation Buttons -->
        <div class="flex items-center gap-2">
            <a href="/flights" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition">
                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
                <span class="text-xs font-medium">Flights</span>
            </a>
            
            <a href="/ai-impact" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                <span class="text-xs font-medium">AI Impact</span>
            </a>

            <a href="/audit" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg border border-slate-700 transition">
                <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <span class="text-xs font-medium">Audit</span>
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT AREA (Scrollable Page) -->
    <main class="flex-1 flex flex-col p-3 gap-3 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Load scripts in order -->
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/flight-detail.js') }}"></script>
    <script src="{{ url_for('static', filename='js/horizon.js') }}"></script>
    <script src="{{ url_for('static', filename='js/event-detail.js') }}"></script>
    <script src="{{ url_for('static', filename='js/parking-detail.js') }}"></script>
    <script src="{{ url_for('static', filename='js/flights.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
