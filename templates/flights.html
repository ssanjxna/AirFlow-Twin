{% extends 'base.html' %}

{% block title %}All Flights - AirFlow Twin{% endblock %}

{% block content %}
<!-- TOP NAVIGATION -->
<div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-4">
        <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Live Simulator
        </a>
        <h2 class="text-xl font-bold text-white">Flight Risk Management</h2>
    </div>
    <div class="flex gap-2">
        <button onclick="sortTable('risk')" class="bg-slate-800 hover:bg-slate-700 text-xs text-white px-3 py-2 rounded border border-slate-700 transition">Sort by Risk</button>
        <button onclick="sortTable('delay')" class="bg-slate-800 hover:bg-slate-700 text-xs text-white px-3 py-2 rounded border border-slate-700 transition">Sort by Delay</button>
    </div>
</div>

<!-- MAIN TABLE CONTAINER -->
<div class="bg-slate-900 rounded-lg border border-slate-800 flex-1 overflow-hidden flex flex-col">
    <div class="overflow-y-auto custom-scrollbar flex-1">
        <table class="w-full text-left">
            <thead class="text-xs text-slate-400 uppercase bg-slate-950/50 sticky top-0 z-10">
                <tr>
                    <th class="px-6 py-4">Flight ID</th>
                    <th class="px-6 py-4">Route</th>
                    <th class="px-6 py-4">Aircraft</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4 text-right">Predicted Delay</th>
                    <th class="px-6 py-4 text-right">Risk Score</th>
                    <th class="px-6 py-4 text-center">Action</th>
                </tr>
            </thead>
            <tbody id="all-flights-table-body" class="divide-y divide-slate-800 text-sm">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
