<!DOCTYPE html>
<html>
<head>
    <title>Calibrate Parking Zone</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #60a5fa; }
        .instructions { color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
        #container { position: relative; display: inline-block; cursor: crosshair; border: 2px solid #334155; border-radius: 8px; }
        img { max-width: 90vw; max-height: 70vh; display: block; }
        #output { margin-top: 20px; font-family: monospace; font-size: 13px; background: #1e293b; padding: 20px; border-radius: 8px; width: 90%; max-width: 800px; text-align: left; white-space: pre-wrap; border: 1px solid #334155; color: #10b981; }
        .zone-marker { 
            position: absolute; 
            border: 3px solid #ef4444; 
            border-radius: 50%; 
            background: radial-gradient(circle, rgba(239, 68, 68, 0.3) 0%, transparent 70%);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn { margin-top: 15px; padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🅿️ Calibrate Parking Congestion Zone</h2>
    <p class="instructions">Click on the CENTER of the parking lot area. The zone will be 250px wide automatically.</p>
    
    <div id="container">
        <img src="static/img/airport_bg.png" id="bg-image">
    </div>

    <div id="output">Click on the parking lot center...</div>
    <button class="btn" onclick="resetCalibration()">Reset</button>

    <script>
        const container = document.getElementById('container');
        const img = document.getElementById('bg-image');
        const output = document.getElementById('output');
        let zoneMarker = null;

        container.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const xPercent = Math.round((x / rect.width) * 100);
            const yPercent = Math.round((y / rect.height) * 100);

            // Remove old marker
            if (zoneMarker) zoneMarker.remove();
            
            // Add new marker (250px wide = bigger circle)
            zoneMarker = document.createElement('div');
            zoneMarker.className = 'zone-marker';
            zoneMarker.style.left = xPercent + '%';
            zoneMarker.style.top = yPercent + '%';
            zoneMarker.style.width = '250px';
            zoneMarker.style.height = '180px';
            container.appendChild(zoneMarker);

            output.innerHTML = `// Parking Zone Coordinates (250x180px)\nconst PARKING_POS = { x: ${xPercent}, y: ${yPercent} };\n\n// In dashboard.js, update:\nzone.style.width = '250px';\nzone.style.height = '180px';`;
        });

        function resetCalibration() {
            if (zoneMarker) zoneMarker.remove();
            output.textContent = 'Click on the parking lot center...';
        }
    </script>
</body>
</html>
