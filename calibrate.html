<!DOCTYPE html>
<html>
<head>
    <title>AirFlow Twin - Coordinate Calibrator</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        h2 { color: #60a5fa; margin-bottom: 10px; }
        .instructions { color: #94a3b8; margin-bottom: 20px; font-size: 14px; text-align: center; max-width: 600px; }
        #container { position: relative; display: inline-block; cursor: crosshair; border: 2px solid #334155; border-radius: 8px; overflow: hidden; }
        img { max-width: 90vw; max-height: 70vh; display: block; }
        #output { margin-top: 20px; font-family: monospace; font-size: 13px; background: #1e293b; padding: 20px; border-radius: 8px; width: 90%; max-width: 800px; text-align: left; white-space: pre-wrap; border: 1px solid #334155; color: #10b981; }
        .dot { position: absolute; width: 14px; height: 14px; background: #ef4444; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
        .dot-label { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; white-space: nowrap; font-family: sans-serif; pointer-events: none; }
        #progress { margin-top: 15px; color: #fbbf24; font-weight: bold; }
        .btn { margin-top: 15px; padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>

    <h2>AirFlow Twin - Coordinate Calibrator</h2>
    <p class="instructions">Click on the center of each plane in order. The coordinates will be generated below. Copy the final code into your dashboard.js file.</p>
    
    <div id="progress">Click on: UK-633 (1 of 6)</div>
    
    <div id="container">
        <img src="static/img/airport_bg.png" id="bg-image">
    </div>

    <div id="output">const hotspotPositions = {<br>  // Click on planes to generate code...<br>};</div>

    <button class="btn" onclick="resetCalibration()">Reset Calibration</button>

    <script>
        const container = document.getElementById('container');
        const img = document.getElementById('bg-image');
        const output = document.getElementById('output');
        const progress = document.getElementById('progress');
        let positions = {};
        let flightNames = ['UK-633', 'BA-6017', 'BA-7303', 'KL-7243', 'SG-1280', 'PARKING'];
        let currentIndex = 0;

        container.addEventListener('click', function(e) {
            if (currentIndex >= flightNames.length) return;

            const rect = img.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const xPercent = Math.round((x / rect.width) * 100);
            const yPercent = Math.round((y / rect.height) * 100);

            const name = flightNames[currentIndex];
            positions[name] = { x: xPercent, y: yPercent };

            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = xPercent + '%';
            dot.style.top = yPercent + '%';
            
            const label = document.createElement('div');
            label.className = 'dot-label';
            label.textContent = name;
            dot.appendChild(label);
            
            container.appendChild(dot);

            let code = "const hotspotPositions = {\n";
            for (let key in positions) {
                code += `    '${key}': { x: ${positions[key].x}, y: ${positions[key].y} },\n`;
            }
            code += "};";
            output.innerText = code;

            currentIndex++;
            if (currentIndex < flightNames.length) {
                progress.textContent = `Click on: ${flightNames[currentIndex]} (${currentIndex + 1} of ${flightNames.length})`;
            } else {
                progress.textContent = "DONE! Copy the code above into your dashboard.js file.";
                progress.style.color = "#10b981";
            }
        });

        function resetCalibration() {
            positions = {};
            currentIndex = 0;
            document.querySelectorAll('.dot').forEach(d => d.remove());
            output.innerText = "const hotspotPositions = {\n  // Click on planes to generate code...\n};";
            progress.textContent = `Click on: ${flightNames[0]} (1 of ${flightNames.length})`;
            progress.style.color = "#fbbf24";
        }
    </script>
</body>
</html>
